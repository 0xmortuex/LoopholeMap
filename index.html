<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopholeMap — Find the cracks in any regulation</title>
  <meta name="description" content="Interactive visual tool that finds loopholes, exemptions, and gray areas in any regulation or law.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/graph.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/chat.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>
<body>

  <!-- ===== Input View ===== -->
  <div class="input-view">
    <!-- Floating lock icon (top-right) -->
    <div class="input-view-actions">
      <button class="cusa-lock-btn" id="cusa-lock-btn" title="Private Mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </button>
      <span class="cusa-badge" id="cusa-badge" style="display:none;">CUSA</span>
    </div>
    <div class="input-card">
      <div class="logo input-logo">
        <svg class="logo-icon" viewBox="0 0 64 64" fill="none">
          <rect x="14" y="8" width="28" height="36" rx="3" stroke="#ef4444" stroke-width="2.5" fill="#0f1219"/>
          <line x1="20" y1="16" x2="36" y2="16" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="22" x2="36" y2="22" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="28" x2="30" y2="28" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
          <circle cx="42" cy="42" r="12" stroke="#ef4444" stroke-width="3" fill="none"/>
          <line x1="50.5" y1="50.5" x2="58" y2="58" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M37 39 L40 42 L47 35" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="logo-text">Loophole<span class="accent">Map</span></span>
      </div>
      <p class="tagline">Find the cracks in any regulation</p>
      <textarea id="regulation-input" class="input-textarea" placeholder="Paste any regulation, law, or policy..." spellcheck="false"></textarea>
      <div class="btn-row">
        <button id="scan-btn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          Scan for Loopholes
        </button>
        <button id="sample-btn" class="btn btn-secondary">Load Sample</button>
        <span class="scan-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to scan</span>
      </div>
    </div>
  </div>

  <!-- ===== Graph View ===== -->
  <div class="graph-view">
    <!-- Top Bar (only in graph view) -->
    <div class="top-bar">
      <div class="top-bar-left">
        <div class="logo" id="back-to-input" title="Back to input">
          <svg class="logo-icon" viewBox="0 0 64 64" fill="none" style="width:24px;height:24px">
            <rect x="14" y="8" width="28" height="36" rx="3" stroke="#ef4444" stroke-width="2.5" fill="#0f1219"/>
            <circle cx="42" cy="42" r="12" stroke="#ef4444" stroke-width="3" fill="none"/>
            <line x1="50.5" y1="50.5" x2="58" y2="58" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">Loophole<span class="accent">Map</span></span>
        </div>
      </div>
      <div class="top-bar-center" id="reg-title"></div>
      <div class="top-bar-right">
        <span class="risk-badge" id="risk-badge"></span>
        <span class="node-count" id="node-count"></span>
        <button class="cusa-lock-btn" id="cusa-lock-btn-graph" title="Private Mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
        <span class="cusa-badge" id="cusa-badge-graph" style="display:none;">CUSA</span>
      </div>
    </div>

    <!-- Main Graph Area -->
    <div class="graph-main">
      <!-- Side Panel -->
      <div class="side-panel" id="side-panel">
        <div class="side-panel-inner">
          <div class="panel-card">
            <div class="panel-card-title">Overall Assessment</div>
            <div class="assessment-text" id="assessment-text"></div>
          </div>
          <div class="panel-card">
            <div class="panel-card-title">Legend</div>
            <div id="legend-content"></div>
          </div>
          <div class="panel-card">
            <div class="panel-card-title">All Issues</div>
            <div class="node-list" id="node-list"></div>
          </div>
          <div class="panel-card">
            <div class="panel-card-title">Statistics</div>
            <div id="stats-content"></div>
          </div>
        </div>
      </div>

      <button class="panel-toggle" id="panel-toggle" title="Toggle side panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="graph-container" id="graph-container"></div>

      <button class="ask-ai-fab" id="ask-ai-fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Ask AI
      </button>

      <div class="graph-controls">
        <button class="btn btn-ghost" id="zoom-in" title="Zoom In">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M8 11h6M11 8v6"/>
          </svg>
        </button>
        <button class="btn btn-ghost" id="zoom-out" title="Zoom Out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35M8 11h6"/>
          </svg>
        </button>
        <button class="btn btn-ghost" id="reset-view" title="Reset View">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
        <button class="btn btn-ghost" id="toggle-labels" title="Toggle Labels">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== CUSA Key Modal ===== -->
  <div class="cusa-modal" id="cusa-modal" style="display:none;">
    <div class="cusa-modal-content">
      <h4>Private Mode</h4>
      <p>Enter your private key for enhanced analysis</p>
      <input type="password" id="cusa-key-input" placeholder="Enter key...">
      <div class="cusa-modal-buttons">
        <button id="cusa-activate-btn">Activate</button>
        <button id="cusa-deactivate-btn" style="display:none;">Deactivate</button>
        <button id="cusa-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== General Chat Panel ===== -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-panel-header">
      <span class="chat-panel-title">Ask about this analysis</span>
      <button class="chat-panel-close" id="chat-panel-close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="chat-panel-context">
      <div class="chat-panel-context-text" id="chat-panel-context-text"></div>
    </div>
    <div class="chat-panel-starters" id="chat-panel-starters"></div>
    <div class="chat-panel-messages" id="chat-panel-messages"></div>
    <div class="chat-panel-input-area">
      <div class="chat-panel-input-row">
        <input class="chat-panel-input" id="chat-panel-input" placeholder="Ask anything about this regulation...">
        <button class="chat-panel-send" id="chat-panel-send">Send</button>
      </div>
    </div>
  </div>

  <!-- ===== Modal ===== -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal"></div>
  </div>

  <!-- ===== Tooltip ===== -->
  <div class="graph-tooltip"></div>

  <!-- ===== Toasts ===== -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
